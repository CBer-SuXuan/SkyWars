queue-template-world: queue
min-players: 2
max-players: 8
long-countdown-seconds: 120
quick-countdown-seconds: 10
quick-countdown-percent: 80
auto-join-non-op: true

queue-spawn:
  x: 10.5
  y: 9
  z: -1.5
  yaw: -90
  pitch: 0.0

game:
  protection-seconds: 30
  game-time-seconds: 600
  ending-seconds: 8
  eliminate-y: -20
  allow-block-break: true
  refill-chests-on-start: true
  # 围绕每个出生点和 spectator-spawn 加载/扫描多少个区块半径来寻找箱子。
  chest-scan-radius-chunks: 3
  grenade-tnt:
    enabled: true
    power: 3.5
    fuse-ticks: 40
    velocity: 1.25
    cooldown-ticks: 60
    break-blocks: true

