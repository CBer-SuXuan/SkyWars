queue-template-world: queue
min-players: 2
max-players: 8
long-countdown-seconds: 120
quick-countdown-seconds: 10
quick-countdown-percent: 80
auto-join-non-op: true

queue-spawn:
  x: 10.5
  y: 9
  z: -1.5
  yaw: -90
  pitch: 0.0

game:
  protection-seconds: 30
  game-time-seconds: 600
  ending-seconds: 8
  eliminate-y: -20
  allow-block-break: true
  refill-chests-on-start: true
  # 围绕每个出生点和 spectator-spawn 加载/扫描多少个区块半径来寻找箱子。
  chest-scan-radius-chunks: 3
  grenade-tnt:
    enabled: true
    power: 3.5
    fuse-ticks: 40
    velocity: 1.25
    cooldown-ticks: 60
    break-blocks: true
  refill:
    enabled: true
    first-after-seconds: 180
    second-after-seconds: 360
    second-refill-ender-pearls-per-chest: 1
  doom:
    enabled: true
    start-after-seconds: 480
    # 插件内安全区收缩，不使用原版 WorldBorder，不会遮挡视线。
    shrink-seconds: 90
    start-radius: 120.0
    end-radius: 18.0
    outside-damage-per-second: 2.0
    outside-pull-strength: 0.35
    bombardment:
      enabled: true
      interval-seconds: 8
      warning-ticks: 30
      radius-around-player: 5.0
      explosion-power: 2.5
      break-blocks: true
      fire: true

